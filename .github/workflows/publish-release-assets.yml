name: Publish Release Assets

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to upload assets to
        required: true
        type: string
      target_commitish:
        description: Commit or branch to check out when building assets
        required: false
        default: main
        type: string
      create_release_if_missing:
        description: Create the release first if it does not exist
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_commitish }}

      - name: Build .skill files
        run: bash .github/scripts/build-skill-archives.sh dist

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CREATE_RELEASE_IF_MISSING: ${{ inputs.create_release_if_missing }}
        run: |
          bash .github/scripts/publish-release-assets.sh \
            "${{ inputs.tag_name }}" \
            dist \
            "${{ inputs.target_commitish }}"
